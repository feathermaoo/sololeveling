<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我獨自升級：鄉村經營篇</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        /* 像素與鄉村風配色風格 */
        :root {
            --bg-color: #dfead6;
            --panel-color: #fff8e7;
            --border-color: #3d2d22;
            --primary-color: #4f8dd3;
            --xp-color: #31b66b;
            --gold-color: #d99022;
            --accent-color: #d95f43;
            --soil-color: #9b6b43;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Silkscreen", "Courier New", "微軟正黑體", sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(255,255,255,.55), transparent 24%),
                linear-gradient(180deg, #cfe6f3 0%, var(--bg-color) 42%, #d7c6a4 100%);
            color: var(--border-color);
            margin: 0;
            padding: 70px 10px 20px 10px; /* 留空間給頂部固定狀態欄 */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.5rem;
            margin: 10px 0;
            text-align: center;
            text-shadow: 2px 2px 0px #fff;
        }

        h2, h3 {
            font-size: 1.1rem;
            margin: 5px 0 10px 0;
            text-shadow: 1px 1px 0px #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 手機版主要容器：單欄流動佈局 */
        .game-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px; /* 鎖定手機黃金寬度 */
        }

        /* 像素風區塊外框 */
        .pixel-box {
            background-color: var(--panel-color);
            border: 4px solid var(--border-color);
            padding: 12px;
            box-shadow: 4px 4px 0px var(--border-color);
            image-rendering: pixelated;
            border-radius: 8px;
            width: 100%;
        }

        /* 頂部固定狀態欄（手機RPG手遊感） */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-radius: 0 0 8px 8px;
            border-top: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #efe0bf;
            padding: 8px 12px;
            box-shadow: 0px 4px 0px var(--border-color);
        }

        .status-level {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
        }

        .status-gold {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
            color: var(--gold-color);
            text-shadow: 1px 1px 0 #fff;
        }

        .bar-container {
            background: #fff;
            border: 2px solid var(--border-color);
            width: 110px;
            height: 14px;
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        /* 調整手機版畫布高度，確保單手好操作 */
        .farm-canvas {
            height: 260px;
            background:
                linear-gradient(rgba(255,255,255,.22) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.22) 1px, transparent 1px),
                linear-gradient(180deg, #82ca74 0%, #5fac62 100%);
            background-size: 32px 32px, 32px 32px, 100% 100%;
            border: 4px solid var(--border-color);
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: inset 0 0 0 4px rgba(255,255,255,.22);
            touch-action: none; /* 防止手機拖曳時畫面網頁跟著滾動 */
        }

        .farm-canvas::before {
            content: "";
            position: absolute;
            inset: auto 0 0 0;
            height: 60px;
            background: repeating-linear-gradient(90deg, var(--soil-color), var(--soil-color) 20px, #855936 20px, #855936 40px);
            opacity: .88;
        }

        .farm-canvas::after {
            content: "📱 自由拖曳物件擺放";
            position: absolute;
            right: 8px;
            top: 8px;
            background: rgba(255, 248, 231, .92);
            border: 2px solid var(--border-color);
            padding: 3px 6px;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 1px 1px 0 var(--border-color);
        }

        .pixel-sprite {
            position: absolute;
            font-size: 2rem;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s ease;
            z-index: 2;
            filter: drop-shadow(2px 3px 0 rgba(61,45,34,.25));
        }

        .speech-bubble {
            position: absolute;
            background: white;
            border: 2px solid var(--border-color);
            padding: 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            z-index: 10;
            max-width: 150px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* 商店改為更適合大拇指點擊的按鈕 */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .shop-grid button {
            min-height: 50px;
            padding: 6px;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
        }

        /* 輸入框與按鈕全像素風外觀修正 */
        input, button, select {
            font-family: "微軟正黑體", sans-serif;
            font-weight: bold;
            padding: 10px;
            border: 2px solid var(--border-color);
            background: #fff;
            box-shadow: 2px 2px 0px var(--border-color);
            outline: none;
            border-radius: 4px;
        }

        button:active {
            box-shadow: 0px 0px 0px var(--border-color);
            transform: translate(2px, 2px);
        }

        button {
            background: #ffbe76;
            cursor: pointer;
        }

        /* 列表優化 */
        ul {
            list-style: none;
            padding: 0;
            margin: 5px 0 0 0;
        }

        li {
            background: #fff;
            border: 2px solid var(--border-color);
            padding: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            border-radius: 4px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .reward-line {
            color: #7a5a30;
            font-weight: bold;
            font-size: 11px;
            display: block;
            margin-top: 4px;
        }

        .weekend-badge {
            background: #ff4757;
            color: white;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid var(--border-color);
            box-shadow: 2px 2px 0 var(--border-color);
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        /* Toast 調整到手機中央偏上方更明顯 */
        .reward-toast {
            position: fixed;
            left: 50%;
            top: 20%;
            transform: translate(-50%, 0);
            background: #fff;
            border: 3px solid var(--border-color);
            padding: 10px 16px;
            box-shadow: 4px 4px 0 var(--border-color);
            z-index: 100;
            text-align: center;
            font-size: 13px;
            width: 80%;
            max-width: 300px;
            animation: popToast 2.0s ease forwards;
        }

        @keyframes popToast {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(.9); }
            15% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            80% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -10px) scale(.95); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div class="pixel-box status-bar">
            <div class="status-level">
                LV<span id="lbl-level">1</span>
                <div class="bar-container"><div id="xp-bar" class="bar-fill" style="background: var(--xp-color);"></div></div>
            </div>
            <div class="status-gold">
                🪙<span id="lbl-gold">0</span>
            </div>
        </div>

        <h1 style="margin-top: 10px;">🌾 我獨自升級 🧑‍🌾</h1>
        <div id="weekend-alert"></div>

        <div class="pixel-box">
            <h2>🏡 我的自由小農舍</h2>
            <div class="farm-canvas" id="farm">
                <div id="bubble" class="speech-bubble"></div>
            </div>

            <h2>🏪 像素雜貨店</h2>
            <div class="shop-grid">
                <button onclick="buyItem('dog', 150)">🐕 柴犬 (150)<br><small>每日打氣</small></button>
                <button onclick="buyItem('cat', 120)">🐈 貓咪 (120)<br><small>療癒巡邏</small></button>
                <button onclick="buyItem('tree', 80)">🌳 果樹 (80)<br><small>果園感</small></button>
                <button onclick="buyItem('radio', 100)">📻 收音機 (100)<br><small>Lo-Fi 氣氛</small></button>
                <button onclick="buyItem('flower', 45)">🌻 向日葵 (45)<br><small>點亮角落</small></button>
                <button onclick="buyItem('bench', 70)">🪑 長椅 (70)<br><small>休息點</small></button>
                <button onclick="buyItem('pond', 110)">💧 小池塘 (110)<br><small>清爽感</small></button>
                <button onclick="buyItem('chest', 160)">🎁 寶箱 (160)<br><small>戰利品</small></button>
            </div>
        </div>

        <div class="pixel-box">
            <h3>✨ 每日正向回饋 (自我讚美)</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="input-good" placeholder="今天做得好的事..." style="flex:1; font-size:13px;">
                <button onclick="addGoodDeed()" style="white-space: nowrap;">記錄</button>
            </div>
            <ul id="list-goods"></ul>

            <hr style="border: 1px dashed var(--border-color); margin: 15px 0;">

            <h3>⚔️ 24小時執行任務清單</h3>
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" id="input-task" placeholder="準備執行的任務..." style="flex:1; font-size:13px;">
                <button onclick="addTask()" style="white-space: nowrap;">發布</button>
            </div>
            <ul id="list-tasks"></ul>

            <hr style="border: 1px dashed var(--border-color); margin: 15px 0;">

            <h3>📖 智力修煉：讀書進度</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:5px; margin-bottom:5px;">
                <input type="text" id="book-name" placeholder="書名" style="font-size:13px;">
                <input type="number" id="book-total" placeholder="總頁數" style="font-size:13px;">
            </div>
            <button onclick="createBook()" style="width: 100%; margin-bottom: 8px;">📖 開始讀新書</button>
            <div id="book-section"></div>
        </div>

    </div>

    <script>
        let gameState = {
            level: 1,
            xp: 0,
            gold: 0,
            inventory: [],
            tasks: [],
            books: []
        };

        function getRequiredXp(level) {
            if (level === 1) return 20;
            if (level >= 2 && level < 5) return 40;
            if (level >= 5 && level < 15) return 60;
            if (level >= 15 && level < 40) return 65 + Math.round((level - 15) * 2.3); 
            if (level >= 40 && level < 65) return 122 + Math.round((level - 40) * 2.4);
            if (level >= 65 && level < 80) return 185 + Math.round((level - 65) * 4.6);
            if (level >= 80 && level < 95) return 260 + (level - 80) * 10;
            if (level === 95) return 450;
            if (level === 96) return 500;
            if (level === 97) return 600;
            if (level === 98) return 700;
            if (level === 99) return 800;
            return 999999;
        }

        function getRewardMultiplier() {
            const day = new Date().getDay();
            return (day === 0 || day === 6) ? 1.5 : 1;
        }

        function showRewardToast(message) {
            const toast = document.createElement('div');
            toast.className = 'reward-toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function gainRewards(baseXp, baseGold, reason = '獲得獎勵') {
            const mult = getRewardMultiplier();
            let finalXp = Math.round(baseXp * mult);
            let finalGold = Math.round(baseGold * mult);

            gameState.xp += finalXp;
            gameState.gold += finalGold;
            showRewardToast(`<strong>${reason}</strong><br>+${finalXp} XP +${finalGold} 🪙`);

            while (gameState.xp >= getRequiredXp(gameState.level) && gameState.level < 100) {
                gameState.xp -= getRequiredXp(gameState.level);
                gameState.level++;
                const levelBonus = 50 + gameState.level * 3;
                alert(`🎉 恭喜羽毛升級到 Lv.${gameState.level}！\n獲得獎勵 ${levelBonus} 金幣 🪙`);
                gameState.gold += levelBonus;
            }

            saveAndRender();
        }

        function addGoodDeed() {
            const input = document.getElementById('input-good');
            if (!input.value.trim()) return;
            
            const ul = document.getElementById('list-goods');
            const li = document.createElement('li');
            li.innerHTML = `<span>✨ ${input.value}</span>`;
            ul.insertBefore(li, ul.firstChild); // 讓最新的顯示在最上面，手機比較好閱讀
            
            input.value = '';
            gainRewards(14, 10, '自我讚美完成');
        }

        function addTask() {
            const input = document.getElementById('input-task');
            if (!input.value.trim()) return;

            const task = {
                id: Date.now(),
                text: input.value,
                createdTime: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                done: false
            };
            gameState.tasks.push(task);
            input.value = '';
            gainRewards(8, 4, '任務已發布');
        }

        function completeTask(id) {
            gameState.tasks = gameState.tasks.filter(t => t.id !== id);
            gainRewards(35, 28, '任務回報完成');
        }

        function createBook() {
            const name = document.getElementById('book-name').value;
            const total = parseInt(document.getElementById('book-total').value);
            if (!name || !total) return;

            gameState.books.push({
                id: Date.now(),
                name: name,
                total: total,
                current: 0
            });
            document.getElementById('book-name').value = '';
            document.getElementById('book-total').value = '';
            saveAndRender();
        }

        function updateBookProgress(id, newPage) {
            const book = gameState.books.find(b => b.id === id);
            if (!book) return;
            
            newPage = Math.min(book.total, Math.max(0, parseInt(newPage) || 0));
            const oldPercent = Math.floor((book.current / book.total) * 100);
            const newPercent = Math.floor((newPage / book.total) * 100);

            if (newPercent > oldPercent) {
                const percentDiff = newPercent - oldPercent;
                gainRewards(percentDiff * 6, percentDiff * 3, '讀書進度提升');
                
                if (newPercent === 100) {
                    alert(`📖 精通大成功！完讀《${book.name}》，\n額外大獎 160 XP / 120 金幣！`);
                    gainRewards(160, 120, '完讀大獎');
                }
            }
            
            book.current = newPage;
            if(book.current === book.total) {
                gameState.books = gameState.books.filter(b => b.id !== id);
            }
            saveAndRender();
        }

        const spriteMap = { dog: '🐕', cat: '🐈', tree: '🌳', radio: '📻', flower: '🌻', bench: '🪑', pond: '💧', chest: '🎁' };
        const spriteQuotes = {
            dog: ["羽毛今天超棒！", "主人，一起升級！", "汪！任務完成的味道！", "休息一下，摸摸我吧！"],
            cat: ["喵~ 你很努力了。", "貓咪批准今天的進度。", "喵。這個角落歸我。"],
            radio: ["🎵 正在播放：像素鄉村 Lo-Fi... 🎵", "專注時間，音量剛剛好。"],
            tree: ["🍎 果樹正在茁壯成長！", "明天也會結出一點成果。"],
            flower: ["向日葵把這裡照亮了。", "小小的美感也是獎勵。"],
            bench: ["坐一下，恢復行動力。", "這裡很適合整理思緒。"],
            pond: ["水面很安靜，腦袋也清爽了。", "池塘反射出今天的努力。"],
            chest: ["寶箱收藏著你的戰利品。", "完成越多，基地越帥。"]
        };
        
        function buyItem(type, cost) {
            if (gameState.gold < cost) {
                alert("🪙 金幣不足！快去解任務賺錢吧！");
                return;
            }
            gameState.gold -= cost;
            const item = createInventoryItem(type);
            gameState.inventory.push(item);
            spawnSprite(item);
            showRewardToast(`<strong>購入成功</strong><br>${spriteMap[type]} 已加入農舍`);
            saveAndRender();
        }

        function createInventoryItem(type) {
            const farm = document.getElementById('farm');
            return {
                id: Date.now() + Math.floor(Math.random() * 999),
                type,
                x: Math.max(10, Math.random() * (farm.clientWidth - 40)),
                y: Math.max(40, Math.random() * (farm.clientHeight - 80))
            };
        }

        function normalizeInventoryItem(item) {
            if (typeof item === 'string') return createInventoryItem(item);
            if (!item.id) item.id = Date.now() + Math.floor(Math.random() * 999);
            return item;
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function spawnSprite(item) {
            const farm = document.getElementById('farm');
            item = normalizeInventoryItem(item);
            const sprite = document.createElement('div');
            sprite.className = 'pixel-sprite';
            sprite.dataset.itemId = item.id;
            sprite.innerText = spriteMap[item.type] || '🎁';
            
            sprite.style.left = clamp(item.x, 0, farm.clientWidth - 35) + 'px';
            sprite.style.top = clamp(item.y, 10, farm.clientHeight - 45) + 'px';

            let dragStart = null;

            // 支援手機觸控的 Pointer Events
            sprite.addEventListener('pointerdown', (e) => {
                sprite.setPointerCapture(e.pointerId);
                sprite.classList.add('dragging');
                const rect = sprite.getBoundingClientRect();
                dragStart = {
                    pointerId: e.pointerId,
                    offsetX: e.clientX - rect.left,
                    offsetY: e.clientY - rect.top,
                    moved: false
                };
            });

            sprite.addEventListener('pointermove', (e) => {
                if (!dragStart || dragStart.pointerId !== e.pointerId) return;
                const farmRect = farm.getBoundingClientRect();
                const x = clamp(e.clientX - farmRect.left - dragStart.offsetX, 0, farm.clientWidth - sprite.offsetWidth);
                const y = clamp(e.clientY - farmRect.top - dragStart.offsetY, 10, farm.clientHeight - sprite.offsetHeight);
                sprite.style.left = x + 'px';
                sprite.style.top = y + 'px';
                dragStart.moved = true;
            });

            sprite.addEventListener('pointerup', (e) => {
                if (!dragStart || dragStart.pointerId !== e.pointerId) return;
                sprite.classList.remove('dragging');
                const stored = gameState.inventory.find(i => i.id === item.id);
                if (stored) {
                    stored.x = parseFloat(sprite.style.left);
                    stored.y = parseFloat(sprite.style.top);
                    localStorage.setItem('solo_leveling_farm', JSON.stringify(gameState));
                }
                if (!dragStart.moved) talkToSprite(item, sprite);
                dragStart = null;
            });

            farm.appendChild(sprite);
        }

        function talkToSprite(item, sprite) {
            const bubble = document.getElementById('bubble');
            const quotes = spriteQuotes[item.type] || ["這是你的戰利品。"];
            bubble.style.left = clamp(parseFloat(sprite.style.left), 5, farm.clientWidth - 140) + 'px';
            bubble.style.top = clamp(parseFloat(sprite.style.top) - 40, 5, 200) + 'px';
            bubble.style.display = 'block';
            bubble.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            setTimeout(() => bubble.style.display = 'none', 2000);
        }

        function saveAndRender() {
            localStorage.setItem('solo_leveling_farm', JSON.stringify(gameState));

            document.getElementById('lbl-level').innerText = gameState.level;
            document.getElementById('lbl-xp').innerText = gameState.xp;
            const nextXp = getRequiredXp(gameState.level);
            document.getElementById('lbl-next-xp').innerText = nextXp;
            document.getElementById('lbl-gold').innerText = gameState.gold;

            const percent = (gameState.xp / nextXp) * 100;
            document.getElementById('xp-bar').style.width = `${percent}%`;

            const mult = getRewardMultiplier();
            document.getElementById('weekend-alert').innerHTML = mult > 1 
                ? `<div class="weekend-badge" style="margin-bottom:10px;">📅 週末 Buff 啟動：收益 1.5 倍！</div>` : '';

            const taskList = document.getElementById('list-tasks');
            taskList.innerHTML = '';
            gameState.tasks.forEach(t => {
                taskList.innerHTML += `
                    <li>
                        <div class="task-header">
                            <div>
                                <strong>⚔️ ${t.text}</strong>
                                <small class="reward-line">💰 +35 XP / +28 金幣</small>
                            </div>
                            <button onclick="completeTask(${t.id})" style="padding: 6px 10px; font-size:12px;">完成</button>
                        </div>
                    </li>
                `;
            });

            const bookSection = document.getElementById('book-section');
            bookSection.innerHTML = '';
            gameState.books.forEach(b => {
                const p = Math.floor((b.current / b.total) * 100);
                bookSection.innerHTML += `
                    <div style="background:#fff; border:2px solid var(--border-color); padding:10px; margin-top:8px; border-radius:4px;">
                        <div style="display:flex; justify-content:space-between; font-weight:bold;">
                            <span>📖 ${b.name}</span>
                            <span>${p}%</span>
                        </div>
                        <div class="bar-container" style="width:100%; height:12px; margin:6px 0 10px 0;">
                            <div class="bar-fill" style="width:${p}%; background:var(--primary-color);"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; font-size:13px;">
                            <span>目前讀到：</span>
                            <div>
                                <input type="number" value="${b.current}" style="width:65px; padding:4px; text-align:center;" 
                                    onchange="updateBookProgress(${b.id}, this.value)"> / ${b.total} 頁
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = function() {
            const saved = localStorage.getItem('solo_leveling_farm');
            if (saved) {
                gameState = JSON.parse(saved);
                gameState.inventory = (gameState.inventory || []).map(normalizeInventoryItem);
                gameState.inventory.forEach(item => spawnSprite(item));
            }
            saveAndRender();
        };
    </script>
</body>
</html>
