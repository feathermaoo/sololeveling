
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="獨自升級">

    <link rel="apple-touch-icon" href="icon-181.png">
    <link rel="icon" type="image/png" href="icon-181.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">

    <title>我獨自升級：鄉村經營篇</title>

    <style>
        :root {
            --bg-color: #dfead6;
            --panel-color: #fff8e7;
            --border-color: #3d2d22;
            --primary-color: #4f8dd3;
            --xp-color: #31b66b;
            --gold-color: #d99022;
            --soil-color: #9b6b43;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Silkscreen", "Courier New", "微軟正黑體", sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(255,255,255,.55), transparent 24%),
                linear-gradient(180deg, #cfe6f3 0%, var(--bg-color) 42%, #d7c6a4 100%);
            color: var(--border-color);
            margin: 0;
            padding: 82px 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.45rem;
            margin: 10px 0;
            text-align: center;
            text-shadow: 2px 2px 0 #fff;
            line-height: 1.3;
        }

        h2, h3 {
            font-size: 1.05rem;
            margin: 5px 0 10px;
            text-shadow: 1px 1px 0 #fff;
            display: flex;
            align-items: center;
            gap: 5px;
            line-height: 1.35;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 500px;
        }

        .pixel-box {
            background-color: var(--panel-color);
            border: 4px solid var(--border-color);
            padding: 12px;
            box-shadow: 4px 4px 0 var(--border-color);
            border-radius: 8px;
            width: 100%;
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-radius: 0 0 8px 8px;
            border-top: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #efe0bf;
            padding: 10px 14px;
            min-height: 44px;
            box-shadow: 0 3px 0 var(--border-color);
        }

        .status-level {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.62rem;
            min-width: 0;
        }

        .status-gold {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.68rem;
            color: var(--gold-color);
            text-shadow: 1px 1px 0 #fff;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .xp-text {
            font-family: "微軟正黑體", sans-serif;
            font-size: 10px;
            font-weight: bold;
            color: #4a3728;
            margin-left: 2px;
            white-space: nowrap;
        }

        .bar-container {
            background: #fff;
            border: 2px solid var(--border-color);
            width: 74px;
            height: 12px;
            display: inline-block;
            flex: 0 0 auto;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        #weekend-alert {
            position: fixed;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            width: min(500px, 100%);
            padding: 0 10px;
            pointer-events: none;
        }

        .weekend-badge {
            background: #ff4757;
            color: white;
            padding: 5px 8px;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid var(--border-color);
            box-shadow: 2px 2px 0 var(--border-color);
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        .clickable-title {
            cursor: pointer;
        }

        .farm-canvas {
            height: 390px;
            background:
                linear-gradient(rgba(255,255,255,.22) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.22) 1px, transparent 1px),
                linear-gradient(180deg, #82ca74 0%, #5fac62 100%);
            background-size: 32px 32px, 32px 32px, 100% 100%;
            border: 4px solid var(--border-color);
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: inset 0 0 0 4px rgba(255,255,255,.22);
            touch-action: none;
        }

        .farm-canvas::before {
            content: "";
            position: absolute;
            inset: auto 0 0 0;
            height: 78px;
            background: repeating-linear-gradient(90deg, var(--soil-color), var(--soil-color) 20px, #855936 20px, #855936 40px);
            opacity: .88;
        }

        .farm-canvas::after {
            content: "📱 自由拖曳擺放";
            position: absolute;
            right: 8px;
            top: 8px;
            background: rgba(255, 248, 231, .92);
            border: 2px solid var(--border-color);
            padding: 3px 6px;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 1px 1px 0 var(--border-color);
        }

        .pixel-sprite {
            position: absolute;
            font-size: 2rem;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s ease;
            z-index: 2;
            filter: drop-shadow(2px 3px 0 rgba(61,45,34,.25));
        }

        .pixel-sprite.dragging {
            transform: scale(1.15);
            z-index: 20;
        }

        .speech-bubble {
            position: absolute;
            background: white;
            border: 2px solid var(--border-color);
            padding: 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            z-index: 10;
            max-width: 150px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        input, button {
            font-family: "微軟正黑體", sans-serif;
            font-weight: bold;
            padding: 10px;
            border: 2px solid var(--border-color);
            background: #fff;
            box-shadow: 2px 2px 0 var(--border-color);
            outline: none;
            border-radius: 4px;
        }

        button {
            background: #ffbe76;
            cursor: pointer;
        }

        button:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .shop-toggle,
        .history-button {
            width: 100%;
            margin-top: 8px;
            background: #ffd166;
        }

        .history-button {
            background: #9ad0c2;
        }

        .shop-panel {
            display: none;
            margin-top: 10px;
        }

        .shop-panel.open {
            display: block;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .shop-grid button {
            min-height: 52px;
            padding: 6px;
            font-size: 11px;
            text-align: center;
            line-height: 1.25;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 5px 0 0;
        }

        li {
            background: #fff;
            border: 2px solid var(--border-color);
            padding: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            border-radius: 4px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .reward-line {
            color: #7a5a30;
            font-weight: bold;
            font-size: 11px;
            display: block;
            margin-top: 4px;
        }

        .backup-section {
            background: #e3d5ca;
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0 var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-top: 5px;
        }

        .reward-toast {
            position: fixed;
            left: 50%;
            top: 20%;
            transform: translate(-50%, 0);
            background: #fff;
            border: 3px solid var(--border-color);
            padding: 10px 16px;
            box-shadow: 4px 4px 0 var(--border-color);
            z-index: 200;
            text-align: center;
            font-size: 13px;
            width: 80%;
            max-width: 300px;
            animation: popToast 2s ease forwards;
        }

        @keyframes popToast {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(.9); }
            15% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            80% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -10px) scale(.95); }
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, .45);
            padding: 70px 12px 20px;
        }

        .modal.open {
            display: block;
        }

        .modal-box {
            background: var(--panel-color);
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0 var(--border-color);
            border-radius: 8px;
            max-width: 500px;
            margin: 0 auto;
            max-height: 80vh;
            overflow: auto;
            padding: 12px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .rank-count {
            color: var(--gold-color);
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="pixel-box status-bar">
            <div class="status-level">
                <span>LV<span id="lbl-level">1</span></span>
                <div class="bar-container"><div id="xp-bar" class="bar-fill" style="background: var(--xp-color);"></div></div>
                <span class="xp-text"><span id="lbl-xp">0</span>/<span id="lbl-next-xp">20</span></span>
            </div>
            <div class="status-gold">🪙<span id="lbl-gold">0</span></div>
        </div>

        <h1>🌾 我獨自升級 🧑‍🌾</h1>
        <div id="weekend-alert"></div>

        <div class="pixel-box">
            <h2 class="clickable-title" onclick="renameVillage()">🏡 <span id="lbl-village-name">我的自由小農舍</span> ✏️</h2>

            <div class="farm-canvas" id="farm">
                <div id="bubble" class="speech-bubble"></div>
            </div>

            <button class="shop-toggle" onclick="toggleShop()">🏪 打開像素雜貨店</button>

            <div id="shop-panel" class="shop-panel">
                <h2>🏪 像素雜貨店</h2>
                <div class="shop-grid" id="shop-grid"></div>
            </div>
        </div>

        <div class="pixel-box">
            <h3>✨ 每日正向回饋</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="input-good" placeholder="今天做得好的事..." style="flex:1; font-size:13px;">
                <button onclick="addGoodDeed()" style="white-space: nowrap;">記錄</button>
            </div>
            <ul id="list-goods"></ul>

            <button class="history-button" onclick="openHistoryModal()">🏆 查看歷史排行</button>

            <hr style="border: 1px dashed var(--border-color); margin: 15px 0;">

            <h3>⚔️ 24小時執行任務</h3>
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" id="input-task" placeholder="準備執行的任務..." style="flex:1; font-size:13px;">
                <button onclick="addTask()" style="white-space: nowrap;">發布</button>
            </div>
            <ul id="list-tasks"></ul>

            <hr style="border: 1px dashed var(--border-color); margin: 15px 0;">

            <h3>📖 智力修煉：讀書進度</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:5px; margin-bottom:5px;">
                <input type="text" id="book-name" placeholder="書名" style="font-size:13px;">
                <input type="number" id="book-total" placeholder="總頁數" style="font-size:13px;">
            </div>
            <button onclick="createBook()" style="width: 100%; margin-bottom: 8px;">📖 開始讀新書</button>
            <div id="book-section"></div>
        </div>

        <div class="backup-section">
            <p style="font-size: 11px; font-weight: bold; margin: 0 0 8px; text-align: center;">☁️ 雲端時光機（免登入帳號備份）</p>
            <div style="display: flex; gap: 8px;">
                <button onclick="cloudBackup()" style="flex: 1; font-size: 11px; background: #81b29a; color: white; border-color: #2b4c3f;">💾 雲端備份</button>
                <button onclick="cloudRestore()" style="flex: 1; font-size: 11px; background: #e07a5f; color: white; border-color: #5c2c20;">⏳ 輸入代碼還原</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal" onclick="closeHistoryModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <strong>🏆 歷史排行</strong>
                <button onclick="closeHistoryModal()" style="padding:6px 10px;">✕</button>
            </div>
            <div id="history-content"></div>
        </div>
    </div>

    <script>
        let gameState = {
            villageName: "我的自由小農舍",
            lastActiveDate: "",
            level: 1,
            xp: 0,
            gold: 0,
            inventory: [],
            tasks: [],
            books: [],
            goodDeeds: [],
            completedTasks: []
        };

        const rewards = {
            goodDeed: 12,
            publishTask: 5,
            completeTask: 30,
            bookPercent: 5,
            finishBook: 120
        };

        const shopItems = [
            { type: 'dog', emoji: '🐕', name: '柴犬', cost: 90, note: '每日打氣' },
            { type: 'cat', emoji: '🐈', name: '貓咪', cost: 75, note: '療癒巡邏' },
            { type: 'tree', emoji: '🌳', name: '果樹', cost: 45, note: '果園感' },
            { type: 'radio', emoji: '📻', name: '收音機', cost: 60, note: 'Lo-Fi 氣氛' },
            { type: 'flower', emoji: '🌻', name: '向日葵', cost: 25, note: '點亮角落' },
            { type: 'bench', emoji: '🪑', name: '長椅', cost: 35, note: '休息點' },
            { type: 'pond', emoji: '💧', name: '小池塘', cost: 70, note: '清爽感' },
            { type: 'chest', emoji: '🎁', name: '寶箱', cost: 95, note: '戰利品' },
            { type: 'house', emoji: '🏠', name: '小木屋', cost: 120, note: '基地核心' },
            { type: 'fence', emoji: '🪵', name: '木柵欄', cost: 20, note: '區域分隔' },
            { type: 'lamp', emoji: '🏮', name: '燈籠', cost: 40, note: '夜晚氣氛' },
            { type: 'mushroom', emoji: '🍄', name: '蘑菇', cost: 18, note: '森林感' },
            { type: 'carrot', emoji: '🥕', name: '胡蘿蔔田', cost: 30, note: '農作物' },
            { type: 'corn', emoji: '🌽', name: '玉米田', cost: 32, note: '收成感' },
            { type: 'scarecrow', emoji: '🧍', name: '稻草人', cost: 55, note: '守護農場' },
            { type: 'well', emoji: '🪣', name: '水井', cost: 65, note: '生活感' },
            { type: 'campfire', emoji: '🔥', name: '營火', cost: 50, note: '暖暖的' },
            { type: 'rock', emoji: '🪨', name: '石頭', cost: 12, note: '自然裝飾' },
            { type: 'crystal', emoji: '💎', name: '水晶', cost: 100, note: '稀有收藏' },
            { type: 'trophy', emoji: '🏆', name: '獎盃', cost: 130, note: '努力證明' }
        ];

        const spriteMap = Object.fromEntries(shopItems.map(item => [item.type, item.emoji]));

        const spriteQuotes = {
            dog: ["羽毛今天超棒！", "主人，一起升級！", "汪！任務完成的味道！"],
            cat: ["喵~ 你很努力了。", "貓咪批准今天的進度。"],
            radio: ["🎵 正在播放：像素鄉村 Lo-Fi... 🎵", "專注時間，音量剛剛好。"],
            tree: ["🍎 果樹正在茁壯成長！", "明天也會結出一點成果。"],
            flower: ["向日葵把這裡照亮了。", "小小的美感也是獎勵。"],
            bench: ["坐一下，恢復行動力。", "這裡很適合整理思緒。"],
            pond: ["水面很安靜，腦袋也清爽了。"],
            chest: ["寶箱收藏著你的戰利品。"],
            house: ["這是你的升級基地。"],
            fence: ["界線清楚，心也比較穩。"],
            lamp: ["燈亮著，今天還能前進一點。"],
            mushroom: ["角落多了一點森林氣息。"],
            carrot: ["胡蘿蔔田準備收成。"],
            corn: ["玉米長得很精神。"],
            scarecrow: ["稻草人守著你的努力。"],
            well: ["水井讓農舍更完整了。"],
            campfire: ["火光很暖，休息一下也很好。"],
            rock: ["石頭讓農場更自然。"],
            crystal: ["水晶閃著稀有光芒。"],
            trophy: ["這是你的努力證明。"]
        };

        function getTodayKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getTimeLabel() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function runDailyRefresh() {
            const today = getTodayKey();

            if (!gameState.lastActiveDate) {
                gameState.lastActiveDate = today;
                return;
            }

            if (gameState.lastActiveDate !== today) {
                gameState.lastActiveDate = today;
            }
        }

        function getRequiredXp(level) {
            if (level === 1) return 20;
            if (level >= 2 && level < 5) return 40;
            if (level >= 5 && level < 15) return 60;
            if (level >= 15 && level < 40) return 65 + Math.round((level - 15) * 2.3);
            if (level >= 40 && level < 65) return 122 + Math.round((level - 40) * 2.4);
            if (level >= 65 && level < 80) return 185 + Math.round((level - 65) * 4.6);
            if (level >= 80 && level < 95) return 260 + (level - 80) * 10;
            if (level === 95) return 450;
            if (level === 96) return 500;
            if (level === 97) return 600;
            if (level === 98) return 700;
            if (level === 99) return 800;
            return 999999;
        }

        function getRewardMultiplier() {
            const day = new Date().getDay();
            return (day === 0 || day === 6) ? 1.5 : 1;
        }

        function calculateGoldFromXp(finalXp) {
            return Math.round(finalXp * 0.6);
        }

        function showRewardToast(message) {
            const toast = document.createElement('div');
            toast.className = 'reward-toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function gainRewards(baseXp, reason = '獲得獎勵') {
            const mult = getRewardMultiplier();
            const finalXp = Math.round(baseXp * mult);
            const finalGold = calculateGoldFromXp(finalXp);

            gameState.xp += finalXp;
            gameState.gold += finalGold;

            showRewardToast(`<strong>${reason}</strong><br>+${finalXp} XP +${finalGold} 🪙`);

            while (gameState.xp >= getRequiredXp(gameState.level) && gameState.level < 100) {
                gameState.xp -= getRequiredXp(gameState.level);
                gameState.level++;

                const levelBonusXp = 30 + gameState.level * 2;
                const levelBonusGold = calculateGoldFromXp(levelBonusXp);
                gameState.gold += levelBonusGold;

                alert(`🎉 恭喜羽毛升級到 Lv.${gameState.level}！\n升級金幣獎勵：${levelBonusGold} 🪙`);
            }

            saveAndRender();
        }

        function renameVillage() {
            const newName = prompt("請輸入新的農舍名稱：", gameState.villageName);
            if (newName && newName.trim()) {
                gameState.villageName = newName.trim();
                saveAndRender();
            }
        }

        function cloudBackup() {
            const backupCode = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem(`cloud_backup_${backupCode}`, JSON.stringify(gameState));
            alert(`💾 備份成功！\n\n時光機還原密碼：【 ${backupCode} 】\n\n請記下此代碼。`);
        }

        function cloudRestore() {
            const code = prompt("請輸入 6 位數時光機還原密碼：");
            if (!code) return;

            const cloudData = localStorage.getItem(`cloud_backup_${code.trim()}`);
            if (!cloudData) {
                alert("❌ 找不到該代碼的紀錄。");
                return;
            }

            if (confirm("檢測到備份存檔！是否覆蓋目前進度？")) {
                gameState = JSON.parse(cloudData);
                localStorage.setItem('solo_leveling_farm', JSON.stringify(gameState));

                document.querySelectorAll('.pixel-sprite').forEach(el => el.remove());
                prepareGameState();
                gameState.inventory.forEach(item => spawnSprite(item));

                saveAndRender();
                alert("⏳ 時光機還原成功！");
            }
        }

        function toggleShop() {
            const panel = document.getElementById('shop-panel');
            const button = document.querySelector('.shop-toggle');
            panel.classList.toggle('open');
            button.innerText = panel.classList.contains('open') ? '🏪 收起像素雜貨店' : '🏪 打開像素雜貨店';
        }

        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = shopItems.map(item => `
                <button onclick="buyItem('${item.type}', ${item.cost})">
                    ${item.emoji} ${item.name} (${item.cost})<br>
                    <small>${item.note}</small>
                </button>
            `).join('');
        }

        function addGoodDeed() {
            const input = document.getElementById('input-good');
            if (!input.value.trim()) return;

            const text = input.value.trim();

            gameState.goodDeeds.push({
                id: Date.now(),
                text,
                date: getTodayKey(),
                time: getTimeLabel()
            });

            input.value = '';
            gainRewards(rewards.goodDeed, '自我讚美完成');
        }

        function addTask() {
            const input = document.getElementById('input-task');
            if (!input.value.trim()) return;

            gameState.tasks.push({
                id: Date.now(),
                text: input.value.trim(),
                createdDate: getTodayKey(),
                createdTime: getTimeLabel()
            });

            input.value = '';
            gainRewards(rewards.publishTask, '任務已發布');
        }

        function completeTask(id) {
            const task = gameState.tasks.find(t => t.id === id);
            if (!task) return;

            gameState.completedTasks.push({
                id: Date.now(),
                text: task.text,
                date: getTodayKey(),
                time: getTimeLabel()
            });

            gameState.tasks = gameState.tasks.filter(t => t.id !== id);
            gainRewards(rewards.completeTask, '任務回報完成');
        }

        function createBook() {
            const name = document.getElementById('book-name').value;
            const total = parseInt(document.getElementById('book-total').value);

            if (!name || !total) return;

            gameState.books.push({
                id: Date.now(),
                name,
                total,
                current: 0
            });

            document.getElementById('book-name').value = '';
            document.getElementById('book-total').value = '';
            saveAndRender();
        }

        function updateBookProgress(id, newPage) {
            const book = gameState.books.find(b => b.id === id);
            if (!book) return;

            newPage = Math.min(book.total, Math.max(0, parseInt(newPage) || 0));
            const oldPercent = Math.floor((book.current / book.total) * 100);
            const newPercent = Math.floor((newPage / book.total) * 100);

            book.current = newPage;

            if (newPercent > oldPercent) {
                const percentDiff = newPercent - oldPercent;
                gainRewards(percentDiff * rewards.bookPercent, '讀書進度提升');

                if (newPercent === 100) {
                    alert(`📖 精通大成功！完讀《${book.name}》！`);
                    gainRewards(rewards.finishBook, '完讀大獎');
                }
            }

            if (book.current === book.total) {
                gameState.books = gameState.books.filter(b => b.id !== id);
            }

            saveAndRender();
        }

        function buyItem(type, cost) {
            if (gameState.gold < cost) {
                alert("🪙 金幣不足！快去解任務賺錢吧！");
                return;
            }

            gameState.gold -= cost;

            const item = createInventoryItem(type);
            gameState.inventory.push(item);
            spawnSprite(item);

            showRewardToast(`<strong>購入成功</strong><br>${spriteMap[type]} 已加入農舍`);
            saveAndRender();
        }

        function createInventoryItem(type) {
            const farm = document.getElementById('farm');

            return {
                id: Date.now() + Math.floor(Math.random() * 999),
                type,
                x: Math.max(10, Math.random() * (farm.clientWidth - 44)),
                y: Math.max(45, Math.random() * (farm.clientHeight - 90))
            };
        }

        function normalizeInventoryItem(item) {
            if (typeof item === 'string') return createInventoryItem(item);

            if (!item.id) item.id = Date.now() + Math.floor(Math.random() * 999);

            if (typeof item.x !== 'number' || typeof item.y !== 'number') {
                const fresh = createInventoryItem(item.type);
                item.x = fresh.x;
                item.y = fresh.y;
            }

            return item;
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function spawnSprite(item) {
            const farm = document.getElementById('farm');
            item = normalizeInventoryItem(item);

            const sprite = document.createElement('div');
            sprite.className = 'pixel-sprite';
            sprite.dataset.itemId = item.id;
            sprite.innerText = spriteMap[item.type] || '🎁';

            sprite.style.left = clamp(item.x, 0, farm.clientWidth - 35) + 'px';
            sprite.style.top = clamp(item.y, 10, farm.clientHeight - 45) + 'px';

            let dragStart = null;

            sprite.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                sprite.setPointerCapture(e.pointerId);
                sprite.classList.add('dragging');

                const rect = sprite.getBoundingClientRect();
                dragStart = {
                    pointerId: e.pointerId,
                    offsetX: e.clientX - rect.left,
                    offsetY: e.clientY - rect.top,
                    moved: false
                };
            });

            sprite.addEventListener('pointermove', (e) => {
                if (!dragStart || dragStart.pointerId !== e.pointerId) return;

                const farmRect = farm.getBoundingClientRect();
                const x = clamp(e.clientX - farmRect.left - dragStart.offsetX, 0, farm.clientWidth - sprite.offsetWidth);
                const y = clamp(e.clientY - farmRect.top - dragStart.offsetY, 10, farm.clientHeight - sprite.offsetHeight);

                sprite.style.left = x + 'px';
                sprite.style.top = y + 'px';
                dragStart.moved = true;
            });

            sprite.addEventListener('pointerup', (e) => {
                if (!dragStart || dragStart.pointerId !== e.pointerId) return;

                sprite.classList.remove('dragging');

                const stored = gameState.inventory.find(i => i.id === item.id);
                if (stored) {
                    stored.x = parseFloat(sprite.style.left);
                    stored.y = parseFloat(sprite.style.top);
                    localStorage.setItem('solo_leveling_farm', JSON.stringify(gameState));
                }

                if (!dragStart.moved) talkToSprite(item, sprite);
                dragStart = null;
            });

            farm.appendChild(sprite);
        }

        function talkToSprite(item, sprite) {
            const farm = document.getElementById('farm');
            const bubble = document.getElementById('bubble');
            const quotes = spriteQuotes[item.type] || ["這是你的戰利品。"];

            bubble.style.left = clamp(parseFloat(sprite.style.left), 5, farm.clientWidth - 145) + 'px';
            bubble.style.top = clamp(parseFloat(sprite.style.top) - 40, 5, farm.clientHeight - 70) + 'px';
            bubble.style.display = 'block';
            bubble.innerText = quotes[Math.floor(Math.random() * quotes.length)];

            setTimeout(() => bubble.style.display = 'none', 2000);
        }

        function getTopItems(records, limit = 10) {
            const counts = {};

            records.forEach(record => {
                const key = record.text.trim();
                if (!key) return;
                counts[key] = (counts[key] || 0) + 1;
            });

            return Object.entries(counts)
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-Hant'))
                .slice(0, limit);
        }

        function openHistoryModal() {
            const topGoods = getTopItems(gameState.goodDeeds || []);
            const topTasks = getTopItems(gameState.completedTasks || []);

            document.getElementById('history-content').innerHTML = `
                <h3>✨ 正向回饋排行</h3>
                ${renderTopList(topGoods, "還沒有正向回饋紀錄")}

                <h3>⚔️ 已完成任務排行</h3>
                ${renderTopList(topTasks, "還沒有完成任務紀錄")}
            `;

            document.getElementById('history-modal').classList.add('open');
        }

        function closeHistoryModal(event) {
            if (event && event.target.id !== 'history-modal') return;
            document.getElementById('history-modal').classList.remove('open');
        }

        function renderTopList(items, emptyText) {
            if (!items.length) {
                return `<p style="font-size:12px;">${emptyText}</p>`;
            }

            return `
                <ul>
                    ${items.map(([text, count], index) => `
                        <li>
                            <div class="task-header">
                                <strong>${index + 1}. ${text}</strong>
                                <span class="rank-count">${count} 次</span>
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
        }

        function saveAndRender() {
            runDailyRefresh();
            localStorage.setItem('solo_leveling_farm', JSON.stringify(gameState));

            const nextXp = getRequiredXp(gameState.level);
            const percent = Math.min(100, (gameState.xp / nextXp) * 100);

            document.getElementById('lbl-village-name').innerText = gameState.villageName || "我的自由小農舍";
            document.getElementById('lbl-level').innerText = gameState.level;
            document.getElementById('lbl-xp').innerText = gameState.xp;
            document.getElementById('lbl-next-xp').innerText = nextXp;
            document.getElementById('lbl-gold').innerText = gameState.gold;
            document.getElementById('xp-bar').style.width = `${percent}%`;

            document.getElementById('weekend-alert').innerHTML = getRewardMultiplier() > 1
                ? `<div class="weekend-badge">📅 週末 Buff：XP 1.5 倍，金幣為 XP 的 60%</div>`
                : '';

            renderTodayGoodDeeds();
            renderTasks();
            renderBooks();
        }

        function renderTodayGoodDeeds() {
            const goodList = document.getElementById('list-goods');
            const today = getTodayKey();
            const todayGoods = (gameState.goodDeeds || []).filter(item => item.date === today);

            goodList.innerHTML = '';

            todayGoods.slice().reverse().forEach(item => {
                goodList.innerHTML += `
                    <li>
                        <span>✨ ${item.text}</span>
                        <small class="reward-line">${item.time}</small>
                    </li>
                `;
            });
        }

        function renderTasks() {
            const taskList = document.getElementById('list-tasks');
            const mult = getRewardMultiplier();
            const taskXp = Math.round(rewards.completeTask * mult);
            const taskGold = calculateGoldFromXp(taskXp);

            taskList.innerHTML = '';

            gameState.tasks.forEach(t => {
                taskList.innerHTML += `
                    <li>
                        <div class="task-header">
                            <div>
                                <strong>⚔️ ${t.text}</strong>
                                <small class="reward-line">💰 +${taskXp} XP / +${taskGold} 🪙</small>
                            </div>
                            <button onclick="completeTask(${t.id})" style="padding: 6px 10px; font-size:12px;">完成</button>
                        </div>
                    </li>
                `;
            });
        }

        function renderBooks() {
            const bookSection = document.getElementById('book-section');
            bookSection.innerHTML = '';

            gameState.books.forEach(b => {
                const p = Math.floor((b.current / b.total) * 100);

                bookSection.innerHTML += `
                    <div style="background:#fff; border:2px solid var(--border-color); padding:10px; margin-top:8px; border-radius:4px;">
                        <div style="display:flex; justify-content:space-between; font-weight:bold;">
                            <span>📖 ${b.name}</span>
                            <span>${p}%</span>
                        </div>
                        <div class="bar-container" style="width:100%; height:12px; margin:6px 0 10px;">
                            <div class="bar-fill" style="width:${p}%; background:var(--primary-color);"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; font-size:13px;">
                            <span>目前讀到：</span>
                            <div>
                                <input type="number" value="${b.current}" style="width:65px; padding:4px; text-align:center;"
                                    onchange="updateBookProgress(${b.id}, this.value)"> / ${b.total} 頁
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function prepareGameState() {
            gameState.villageName = gameState.villageName || "我的自由小農舍";
            gameState.lastActiveDate = gameState.lastActiveDate || getTodayKey();
            gameState.inventory = (gameState.inventory || []).map(normalizeInventoryItem);
            gameState.tasks = gameState.tasks || [];
            gameState.books = gameState.books || [];
            gameState.goodDeeds = gameState.goodDeeds || [];
            gameState.completedTasks = gameState.completedTasks || [];
            runDailyRefresh();
        }

        window.onload = function() {
            renderShop();

            const saved = localStorage.getItem('solo_leveling_farm');

            if (saved) {
                gameState = JSON.parse(saved);
            }

            prepareGameState();
            gameState.inventory.forEach(item => spawnSprite(item));
            saveAndRender();
        };
    </script>
    <div class="feather-footer"; font-size: 10px;>
            🕊️ Developed by feathermaoo <br>
        627115 v1.0</br>
        </div>
